<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open - Centered Image & Music</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="assets/images/tropa.jpg" alt="Centered" class="center-image" id="mainImage">
        <div class="desc-text">Graduating yarnnnn!!</div>
        <audio id="audioPlayer">
            <source src="assets/music/grad.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        <div id="musicOverlay" class="music-overlay" style="display:none;">
            <button class="music-overlay-btn">Tap to Play the Music</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
